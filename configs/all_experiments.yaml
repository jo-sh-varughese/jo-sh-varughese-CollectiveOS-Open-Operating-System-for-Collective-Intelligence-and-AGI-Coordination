# configs/institution_ppo.yaml
name: institution_ppo
environment: institution
env_kwargs:
  n_agents: 6
  max_resource: 100.0
  regen_rate: 0.3
  collapse_thresh: 5.0
  allow_rule_proposals: true
agent_type: ppo
agent_kwargs:
  lr: 0.0003
  clip_eps: 0.2
  n_epochs: 4
  hidden: 128
n_episodes: 500
max_steps: 300
seed: 42
log_interval: 25
save_dir: results
device: cpu

---
# configs/institution_greedy.yaml
name: institution_greedy
environment: institution
env_kwargs:
  n_agents: 6
  max_resource: 100.0
  allow_rule_proposals: false
agent_type: greedy
agent_kwargs: {}
n_episodes: 50
max_steps: 300
seed: 42
log_interval: 10
save_dir: results
device: cpu

---
# configs/market_ppo.yaml
name: market_ppo
environment: market
env_kwargs:
  n_agents: 6
  init_inv: 50.0
  init_cash: 200.0
agent_type: ppo
agent_kwargs:
  lr: 0.0003
  clip_eps: 0.2
  n_epochs: 4
  hidden: 128
n_episodes: 500
max_steps: 300
seed: 42
log_interval: 25
save_dir: results
device: cpu
